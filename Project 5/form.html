<!DOCTYPE html>
<html>
<head>
    <title>Forest Details Form</title>
</head>

<body>

<h2>Forest Details Form</h2>

<form>

    <label>Forest Name:</label><br>
    <input type="text" name="forestName"><br><br>

    <label>Location:</label><br>
    <input type="text" name="location"><br><br>

    <label>Forest Area (in sq km):</label><br>
    <input type="number" name="area"><br><br>

    <label>Number of Trees:</label><br>
    <input type="number" name="trees"><br><br>

    <label>Forest Type:</label><br>
    <select name="type">
        <option>Tropical</option>
        <option>Deciduous</option>
        <option>Coniferous</option>
        <option>Mangrove</option>
    </select><br><br>

    <label>Date Established:</label><br>
    <input type="date" name="date"><br><br>

    <label>Description:</label><br>
    <textarea name="description" rows="4" cols="30"></textarea><br><br>

    <input type="submit" value="Save Forest Details">
    <input type="reset" value="Clear">

</form>

</body>
</html>
