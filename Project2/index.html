    <form>

        <h1>Portfolio Form</h1>

        <div>
            <label>Enter Name:</label><br>
            <input type="text" name="name" placeholder="Enter your name">
        </div>
        <br>

        <div>
            <label>Email:</label><br>
            <input type="email" name="email" placeholder="Enter your email">
        </div>
        <br>

        <div>
            <label>Phone Number:</label><br>
            <input type="number" name="phone" placeholder="Enter phone number">
        </div>
        <br>

        <div>
            <label>Portfolio Description:</label><br>
            <textarea name="description" rows="4" cols="30"></textarea>
        </div>
        <br>

        <div>
            <label>Upload Portfolio Files:</label><br>
            <input type="file" name="portfolioFile">
        </div>
        <br>

        <div>
            <label>LinkedIn Profile:</label><br>
            <input type="url" name="linkedin" placeholder="Enter LinkedIn URL">
        </div>
        <br>

        <div>
            <label>Date and Time:</label><br>
            <input type="datetime-local" name="datetime">
        </div>
        <br>

        <div>
            <label>Set Password:</label><br>
            <input type="password" name="password">
        </div>
        <br>

        <div>
            <label>Confirm Password:</label><br>
            <input type="password" name="confirmPassword">
        </div>
        <br>

        <div>
            <label>Select Week:</label><br>
            <input type="week" name="week">
        </div>
        <br>

        <div>
            <label>Select Programming Languages:</label><br>
            <input type="checkbox" name="language" value="Java"> Java <br>
            <input type="checkbox" name="language" value="Python"> Python <br>
            <input type="checkbox" name="language" value="C"> C <br>
            <input type="checkbox" name="language" value="C++"> C++
        </div>
        <br>

        <div>
            <label>Select Date:</label><br>
            <input type="date" name="date">
        </div>
        <br>

        <div>
            <input type="button" value="Edit Details">
            <input type="submit" value="Submit">
        </div>

    </form>

</body>
