<!DOCTYPE html>
<html>
<head>
    <title>Employee Form</title>
    <script src="task2.js"></script>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            width: 100%;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Employee Form</h2>

    <form name="empForm" onsubmit="return validateForm()">
        <label>Name:</label>
        <input type="text" name="name">

        <label>Email:</label>
        <input type="text" name="email">

        <label>Salary:</label>
        <input type="text" name="salary">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
