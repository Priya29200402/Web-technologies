<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial;
        background-color: #f4f4f4;
    }
    .container {
        width: 350px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
    }
    .error {
        color: red;
        font-size: 14px;
    }
    button {
        width: 100%;
        padding: 10px;
        background: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form onsubmit="return validateForm()">

        <label>Name:</label>
        <input type="text" id="name">
        <div id="nameError" class="error"></div>

        <label>USN:</label>
        <input type="text" id="usn">
        <div id="usnError" class="error"></div>

        <label>Phone:</label>
        <input type="tel" id="phone">
        <div id="phoneError" class="error"></div>

        <label>Email:</label>
        <input type="email" id="email">
        <div id="emailError" class="error"></div>

        <button type="submit">Submit</button>
    </form>
</div>


<script src="formNew.js"></script>

</body>
</html>
