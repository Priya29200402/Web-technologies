<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CSS Page</title>
    <style>
        p{
            background: linear-gradient(to left, skyblue, lightgreen);
        }
    </style>
    <style>
        #helloId{
            border: 1vh solid skyblue;
            border-radius: 1vh;
        }
        table, tr, td, th{
            border: 1vh solid black;
            border-collapse: collapse;

        }

    </style>

    <p id="helloId">hello</p>
    <table>
        <tr>
            <th>1</th>
            <th>2</th>
            <th>3</th>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        
    </table>

</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Magni, maiores!</p>
</body>
</html>
